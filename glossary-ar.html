        const grid = document.getElementById('termsGrid');
        const modal = document.getElementById('termModal');

        const renderTerms = (items) => {
            grid.innerHTML = '';
            items.slice(0, 200).forEach((term) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="ar-term">${term.ar_term}</div><div class="en-term">${term.en_term}</div><div class="badge">مسار مستقل: glossary_terms/${term.id}</div>`;
                card.onclick = () => loadTermData(term.id);
                grid.appendChild(card);
            });
        };
        renderTerms(metaTerms);

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = metaTerms.filter(t => t.ar_term.includes(val) || t.en_term.toLowerCase().includes(val));
            renderTerms(filtered);
        });

        document.getElementById('closeModal').onclick = () => { modal.classList.remove('active'); };

        async function loadTermData(termId) {
            modal.classList.add('active');
            const area = document.getElementById('animationArea');
            area.innerHTML = '<span style="color:#fff;">جاري تحميل الملفات...</span>';
            document.getElementById('modalArTerm').textContent = "جاري التحميل...";
            
            try {
                // Fetch JSON Definition
                const resp = await fetch(`./glossary_terms/${termId}/data.json`);
                const termData = await resp.json();
                
                document.getElementById('modalArTerm').textContent = termData.ar_term;
                document.getElementById('modalEnTerm').textContent = termData.en_term;
                document.getElementById('modalArDef').textContent = termData.ar_def;
                document.getElementById('pathInfo').innerHTML = `
                    مسار البيانات: <code>./glossary_terms/${termId}/data.json</code><br>
                    مسار الرسم/UML: <code>./glossary_terms/${termId}/visual.js</code>
                `;
                
                // Fetch and execute Visual Script
                const scriptResp = await fetch(`./glossary_terms/${termId}/visual.js`);
                const scriptText = await scriptResp.text();
                
                area.innerHTML = '';
                
                // Execute logic
                const func = new Function("container", "termData", scriptText + "\n return renderVisual;");
                const renderVisual = func();
                renderVisual(area, termData);

            } catch (err) {
                area.innerHTML = `<span style="color:#ef4444;">حدث خطأ أثناء تحميل الملفات الهيكلية: ${err}</span>`;
            }
        }
